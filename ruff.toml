
line-length    = 88
target-version = "py310"


[lint]
    exclude = ["examples"]
    ignore  = ["COM", "D203", "D211", "D213"]
    select  = ["ALL"]

    [lint.per-file-ignores]
        "tests/**" = ["S101", "N"]
        "tests/expected_output/**" = ["N", "I001", "F401", "Q000", "UP045"]


[format]
    docstring-code-format = true
